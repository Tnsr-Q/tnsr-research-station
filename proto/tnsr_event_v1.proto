syntax = "proto3";
package tnsr.event.v1;

message EventEnvelope {
  string version = 1;
  string event_id = 2;
  string trace_id = 3;
  optional string parent_id = 4;
  string session_id = 5;
  string topic = 6;
  string source = 7;
  string created_at_ms = 8;  // u128 serialized as string; proto3 has no uint128
  string payload_json = 9;
  optional string input_hash = 10;
  optional string artifact_hash = 11;
  optional string schema_hash = 12;
  optional string plugin_hash = 13;
}
